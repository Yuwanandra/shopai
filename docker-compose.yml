version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: shopai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       shopai_db
      POSTGRES_USER:     shopai_user
      POSTGRES_PASSWORD: shopai_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopai_user -d shopai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopai_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:              development
      PORT:                  5000
      DATABASE_URL:          postgresql://shopai_user:shopai_pass@postgres:5432/shopai_db
      JWT_SECRET:            local-dev-jwt-secret-change-me
      JWT_EXPIRES_IN:        7d
      ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY}
      MIDTRANS_SERVER_KEY:   ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY:   ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_IS_PRODUCTION: false
      FRONTEND_URL:          http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: shopai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL:               ""
      VITE_MIDTRANS_CLIENT_KEY:   ${MIDTRANS_CLIENT_KEY}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
